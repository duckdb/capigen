name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run --group dev pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uvx ruff check .
      - run: uvx ruff format --check .
      - run: uvx ty check src/capigen

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - name: schema files are packaged
        run: |
          uv run --no-project python - <<'PY'
          import glob, zipfile
          wheel = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          for required in ("capigen/schema/module.schema.json",
                           "capigen/schema/metadata.schema.json",
                           "capigen/py.typed"):
              assert any(n.endswith(required) for n in names), f"missing {required} in {wheel}"
          print("ok:", wheel)
          PY
