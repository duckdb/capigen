module: core
handles:
  ctx:
    description: An opaque context handle
  database:
    description: An opaque handle to a database instance
  scratch:
    description: An experimental scratch buffer
    status:
      - ["unstable", "v1.0.0", "2026-01-01"]
aliases:
  error_code:
    underlying: u32
  API_CALL:
    underlying: error_code
enums:
  TYPE:
    description: Type enum
    values:
      TYPE_INVALID:
        value: 0
      TYPE_BOOLEAN:
        description: bool
constants:
  API_ERROR:
    value: 0xFFFFFFFF
functions:
  open:
    summary: "Opens a database."
    return_type: API_CALL
    return_pointer: 0
    return_const: false
    parameters:
      context:
        type: ctx
        indirection: 0
        const: false
      path:
        type: char
        indirection: 1
        const: true
      out_database:
        type: database
        indirection: 1
        const: false
        kind: OUT
  close:
    summary: "Closes a database."
    return_type: API_CALL
    return_pointer: 0
    return_const: false
    parameters:
      context:
        type: ctx
        indirection: 0
        const: false
      database:
        type: database
        indirection: 1
        const: false
  scratch_create:
    summary: "Creates a scratch buffer."
    status:
      - ["unstable", "v1.0.0", "2026-01-01"]
    return_type: API_CALL
    return_pointer: 0
    return_const: false
    parameters:
      context:
        type: ctx
        indirection: 0
        const: false
      out_scratch:
        type: scratch
        indirection: 1
        const: false
        kind: OUT
