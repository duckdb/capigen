schema_version: "0.4"
versions:
  - "1.0.0"
prefix: "duckdb_v2_"
suffixes:
  handles: "_ptr"
  callbacks: "_cb"
  aliases: "_t"
primitives:
  - name: opaque
    c_type: void
  - name: char
    c_type: char
  - name: bool
    c_type: bool
  - name: i32
    c_type: int32_t
  - name: u32
    c_type: uint32_t
  - name: u64
    c_type: uint64_t
  - name: i64
    c_type: int64_t
  - name: idx
    c_type: idx_t
    underlying: uint64_t
