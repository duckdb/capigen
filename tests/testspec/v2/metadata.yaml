schema_version: "0.5"
versions:
  - "v1.0.0"
prefix: "duckdb_v2_"
lifecycle_states:
  unstable: {visibility: opt_in, guard: DUCKDB_V2_API_UNSTABLE}
  stable: {visibility: always}
  deprecated: {visibility: opt_out, guard: DUCKDB_V2_API_NO_DEPRECATED}
  removed: {visibility: never}
suffixes:
  handles: "_ptr"
  callbacks: "_cb"
  aliases: "_t"
primitives:
  - name: opaque
    c_type: void
  - name: char
    c_type: char
  - name: bool
    c_type: bool
  - name: i32
    c_type: int32_t
  - name: u32
    c_type: uint32_t
  - name: u64
    c_type: uint64_t
  - name: i64
    c_type: int64_t
  - name: idx
    c_type: idx_t
    underlying: uint64_t
