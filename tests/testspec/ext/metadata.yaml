schema_version: "0.5"
versions:
  - "v1.0.0"
prefix: "ext_"
suffixes:
  handles: ""
  callbacks: ""
  aliases: ""
primitives:
  - name: void
    c_type: void
  - name: char
    c_type: char
  - name: i32
    c_type: int32_t
  - name: i64
    c_type: int64_t
  - name: u32
    c_type: uint32_t
  - name: idx
    c_type: idx_t
    underlying: uint64_t
lifecycle_states:
  unstable: {visibility: opt_in, guard: EXT_API_UNSTABLE}
  stable: {visibility: always}
