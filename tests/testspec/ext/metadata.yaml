schema_version: "0.5"
versions:
  - "1.0.0"
prefix: "ext_"
suffixes:
  handles: ""
  callbacks: ""
  aliases: ""
primitives:
  - name: void
    c_type: void
  - name: char
    c_type: char
  - name: i32
    c_type: int32_t
  - name: i64
    c_type: int64_t
  - name: u32
    c_type: uint32_t
  - name: idx
    c_type: idx_t
    underlying: uint64_t
options:
  extension:
    unstable_guard: EXT_API_UNSTABLE
    create_method: CreateExtAPI
    api_version: "v1.0.0"
    version_macro_prefix: EXT_API_VERSION
    internal_include: ext.h
    exclude:
      - skipme
